<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a2340"/><stop offset="1" stop-color="#0a0e15"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#54d6b2" stop-opacity="0.35"/><stop offset="1" stop-color="#54d6b2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mint" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#7df0d2"/><stop offset="1" stop-color="#2bbf9a"/></linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ffe089"/><stop offset="1" stop-color="#e7a93f"/></linearGradient>
    <linearGradient id="rose" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ff9bb8"/><stop offset="1" stop-color="#e2618a"/></linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>
  <!-- triple-tile motif: three glossy rounded tiles -->
  <g transform="translate(256 268)">
    <g transform="translate(-78 36) rotate(-9)"><rect x="-72" y="-72" width="144" height="144" rx="34" fill="url(#rose)"/><rect x="-72" y="-72" width="144" height="58" rx="34" fill="#ffffff" opacity="0.22"/></g>
    <g transform="translate(82 24) rotate(8)"><rect x="-72" y="-72" width="144" height="144" rx="34" fill="url(#gold)"/><rect x="-72" y="-72" width="144" height="58" rx="34" fill="#ffffff" opacity="0.22"/></g>
    <g transform="translate(0 -52) rotate(-2)"><rect x="-80" y="-80" width="160" height="160" rx="38" fill="url(#mint)"/><rect x="-80" y="-80" width="160" height="64" rx="38" fill="#ffffff" opacity="0.26"/></g>
  </g>
</svg>
