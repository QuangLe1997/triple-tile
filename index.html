<style>
  :root{
    --mint:#54d6b2; --gold:#e7c06a; --rose:#e493ac; --cream:#f0ead8;
    --bg:#080b12; --ink:#eef2f3; --muted:#94a3ad;
    --panel:rgba(14,19,28,.82); --line:rgba(255,255,255,.12);
    --font:'Segoe UI',system-ui,-apple-system,Arial,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font-family:var(--font);overflow:hidden;
    user-select:none;-webkit-user-select:none;touch-action:none;}
  #c{position:fixed;inset:0;display:block;width:100%;height:100%;}

  #hud{position:fixed;left:0;right:0;top:max(10px,env(safe-area-inset-top));z-index:9;
    display:flex;gap:9px;justify-content:center;align-items:center;pointer-events:none;padding:0 12px;}
  .chip{padding:2px 14px;min-width:58px;text-align:center;}   /* flat — no card */
  .chip .l{font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.7);text-transform:uppercase;text-shadow:0 1px 4px rgba(0,0,0,.45);}
  .chip .v{font-size:22px;font-weight:800;line-height:1.15;text-shadow:0 2px 6px rgba(0,0,0,.5);}
  .chip.score .v{color:var(--mint);} .chip.best .v{color:var(--gold);} .chip.level .v{color:var(--rose);}

  #menuWrap{position:fixed;right:max(10px,env(safe-area-inset-right));top:max(10px,env(safe-area-inset-top));z-index:12;
    display:flex;flex-direction:column;align-items:flex-end;gap:10px;}
  #menuToggle{width:46px;height:46px;display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--ink);cursor:pointer;
    background:var(--panel);border:1px solid var(--line);border-radius:14px;backdrop-filter:blur(10px);box-shadow:0 6px 18px rgba(0,0,0,.5);transition:transform .15s;}
  #menuToggle:active{transform:scale(.9);}
  #tools{display:flex;flex-direction:column;gap:10px;transition:opacity .2s ease,transform .2s ease;transform-origin:top right;}
  #tools.closed{opacity:0;transform:translateY(-8px) scale(.85);pointer-events:none;}
  .tool{width:46px;height:46px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;color:var(--ink);
    background:var(--panel);border:1px solid var(--line);border-radius:14px;backdrop-filter:blur(10px);box-shadow:0 6px 18px rgba(0,0,0,.5);transition:transform .12s;}
  .tool:active{transform:scale(.88);}
  .tool .ic{font-size:22px;line-height:1;} .tool .n{font-size:10px;font-weight:800;color:var(--gold);}
  .tool.off{opacity:.4;}

  #combo{position:fixed;left:50%;top:26%;transform:translateX(-50%) scale(.5);z-index:12;pointer-events:none;
    font-size:34px;font-weight:900;letter-spacing:1px;opacity:0;
    background:linear-gradient(100deg,var(--mint),var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 2px 18px rgba(231,192,106,.6));}
  #flash{position:fixed;inset:0;background:radial-gradient(circle,rgba(231,192,106,.35),transparent 70%);opacity:0;pointer-events:none;z-index:8;}

  .overlay{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;gap:22px;background:radial-gradient(120% 90% at 50% 38%,rgba(18,26,38,.55),rgba(5,8,14,.95));
    backdrop-filter:blur(8px);transition:opacity .4s;}
  .overlay.hidden{opacity:0;pointer-events:none;}
  .title{font-size:clamp(38px,11vw,76px);font-weight:800;letter-spacing:3px;line-height:.95;
    background:linear-gradient(105deg,var(--mint),var(--cream) 50%,var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 4px 26px rgba(0,0,0,.55));}
  .sub{font-size:12px;letter-spacing:4px;color:var(--muted);text-transform:uppercase;margin-top:-8px;}
  .panel{position:relative;background:transparent;border:0;border-radius:0;padding:10px 20px;max-width:90vw;}  /* flat — no card */
  .help{font-size:13px;line-height:1.95;color:var(--muted);} .help b{color:var(--mint);}
  .gostats{display:flex;gap:34px;justify-content:center;margin:4px 0 14px;}
  .gostats .l{font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
  .gostats .v{font-size:32px;font-weight:800;}
  .newbest{color:var(--gold);font-weight:800;letter-spacing:3px;font-size:13px;animation:pulse 1.3s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}

  /* full-bleed banner home */
  #menu{align-items:stretch;justify-content:flex-end;padding:0;gap:0;backdrop-filter:none;
    background:
      linear-gradient(to top,rgba(5,8,14,.94) 0%,rgba(5,8,14,.5) 22%,transparent 48%),
      linear-gradient(to bottom,rgba(5,8,14,.5) 0%,transparent 26%),
      url('banner-desktop.png') center center / cover no-repeat, var(--bg);
    animation:fadeIn .6s ease both;}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  @media (max-width:600px){
    #menu{background:
      linear-gradient(to top,rgba(5,8,14,.96) 0%,rgba(5,8,14,.55) 26%,transparent 54%),
      url('banner-mobile.png') center top / 100% auto no-repeat, var(--bg);}
  }
  .menu-dock{position:relative;z-index:2;width:100%;display:flex;flex-direction:column;align-items:center;
    gap:15px;padding:0 22px max(34px,calc(env(safe-area-inset-bottom) + 22px));animation:dockIn .6s .15s cubic-bezier(.2,.8,.2,1) both;}
  @keyframes dockIn{from{opacity:0;transform:translateY(28px);}to{opacity:1;transform:none;}}
  .menu-dock .help{max-width:440px;text-align:center;text-shadow:0 2px 14px rgba(0,0,0,.9);}
  .btn{pointer-events:auto;cursor:pointer;border:1px solid var(--line);background:rgba(255,255,255,.05);color:var(--ink);
    border-radius:14px;padding:15px 26px;font-family:var(--font);font-size:16px;font-weight:700;letter-spacing:2px;transition:all .15s;}
  .btn-primary{background:linear-gradient(100deg,rgba(84,214,178,.24),rgba(231,192,106,.24));border-color:rgba(84,214,178,.5);color:var(--cream);}
  .btn-primary:hover{background:linear-gradient(100deg,rgba(84,214,178,.36),rgba(231,192,106,.36));border-color:var(--gold);transform:translateY(-2px);}
  .btn-play{width:min(440px,86vw);padding:18px 26px;font-size:18px;letter-spacing:3px;border-radius:18px;
    background:linear-gradient(100deg,rgba(84,214,178,.95),rgba(231,192,106,.95));border:0;color:#08110d;font-weight:800;
    box-shadow:0 16px 44px -10px rgba(84,214,178,.7),0 6px 22px rgba(0,0,0,.5);animation:playPulse 2.4s ease-in-out infinite;}
  .btn-play:hover{filter:brightness(1.07);transform:translateY(-2px);}
  @keyframes playPulse{0%,100%{box-shadow:0 16px 44px -10px rgba(84,214,178,.6),0 6px 22px rgba(0,0,0,.5);}
    50%{box-shadow:0 20px 60px -8px rgba(84,214,178,.95),0 6px 22px rgba(0,0,0,.5);}}
  #loading{position:fixed;inset:0;z-index:30;display:flex;align-items:center;justify-content:center;background:var(--bg);
    color:var(--muted);font-size:13px;letter-spacing:3px;transition:opacity .5s;}
  #loading.hidden{opacity:0;pointer-events:none;display:none;}
  @media (prefers-reduced-motion:reduce){ .menu-dock,#menu,.btn-play{animation:none;} }
</style>

<canvas id="c"></canvas>

<div id="hud">
  <div class="chip level"><div class="l">Level</div><div class="v" id="ui-level">1</div></div>
  <div class="chip score"><div class="l">Score</div><div class="v" id="ui-score">0</div></div>

  <div id="tools" class="closed">
    <div class="tool" id="undoBtn"><div class="ic">↩️</div><div class="n" id="undoN">3</div></div>
    <div class="tool" id="shuffleBtn"><div class="ic">🔀</div><div class="n" id="shuffleN">3</div></div>

</div>

<div class="overlay hidden" id="result">
  <div class="title" id="resTitle" style="font-size:clamp(34px,9vw,64px)">LEVEL CLEAR</div>

  <div class="panel">
    <div class="gostats">
      <div><div class="l">Score</div><div class="v" id="res-score" style="color:var(--mint)">0</div></div>
      <div><div class="l">Best</div><div class="v" id="res-best" style="color:var(--gold)">0</div></div>

</div>

<script type="module">
import * as THREE from 'three';
import { RoundedBoxGeometry } from './vendor/RoundedBoxGeometry.js';

// ---------------- palette + symbols ----------------
// vivid, premium jewel-candy palette (saturated & bright, pops on black)
const FACES = [
  {b:0x1fd9c4,e:0x7ff0e2}, {b:0xff4f93,e:0xff8fbb}, {b:0xffc21f,e:0xffdd73},
  {b:0x37b6ff,e:0x86d8ff}, {b:0xa86bff,e:0xc9a6ff}, {b:0x2fdd86,e:0x8af0bb},
  {b:0xff7a44,e:0xffae84}, {b:0xa6e83a,e:0xcef185}, {b:0xff5f86,e:0xff9bb4},
  {b:0x2fe0e0,e:0x86f0f0}, {b:0xffb31f,e:0xffd470}, {b:0xc07cff,e:0xd9b3ff},
];
const SYMBOLS = ['🍓','🍋','🍇','🫐','🍊','🥝','🍑','🌶️','🥥','🔔','⭐','💎','🍀','🌸','🎈','🍪'];

// ---------------- state ----------------
const S = {
  tiles:[], trayArr:[], score:0, best:0, level:1, undo:3, shuffle:3,
  history:[], started:false, over:false, won:false, muted:false, busy:false,
  phase:'menu', introT:0,
};
function loadBest(){ try{ S.best=+localStorage.getItem('tt3d_best')||0; }catch(e){} }
function saveBest(){ try{ localStorage.setItem('tt3d_best',S.best); }catch(e){} }

// ---------------- audio ----------------
let _ac=null;
function ac(){ if(!_ac){ try{ _ac=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return _ac; }
function beep(f,d,t,v,slide){ if(S.muted)return; const c=ac(); if(!c)return; const o=c.createOscillator(),g=c.createGain(),n=c.currentTime;
  o.type=t||'sine'; o.frequency.setValueAtTime(f,n); if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(40,slide),n+d);
  g.gain.setValueAtTime(0,n); g.gain.linearRampToValueAtTime(v||0.16,n+0.008); g.gain.exponentialRampToValueAtTime(0.0001,n+d);
  o.connect(g); g.connect(master||c.destination); o.start(n); o.stop(n+d+0.03); }
let master=null, musicNodes=[];
function initAudioGraph(){ const c=ac(); if(!c||master)return; master=c.createGain(); master.gain.value=0.9; master.connect(c.destination); }
function startMusic(){ const c=ac(); if(!c||musicNodes.length||S.muted)return; initAudioGraph();
  const root=110, mk=(f,ty,v)=>{ const o=c.createOscillator(),g=c.createGain(); o.type=ty; o.frequency.value=f; g.gain.value=v; o.connect(g); g.connect(master); o.start(); return [o,g]; };
  const filt=c.createBiquadFilter(); filt.type='lowpass'; filt.frequency.value=520;
  const a=mk(root,'sine',0.05), b=mk(root*1.5,'triangle',0.022), d=mk(root*2.01,'sine',0.016);
  a[1].disconnect(); b[1].disconnect(); d[1].disconnect(); a[1].connect(filt); b[1].connect(filt); d[1].connect(filt); filt.connect(master);
  const lfo=c.createOscillator(), lg=c.createGain(); lfo.frequency.value=0.08; lg.gain.value=140; lfo.connect(lg); lg.connect(filt.frequency); lfo.start();
  musicNodes=[a[0],b[0],d[0],lfo]; }
function unlock(){ const c=ac(); if(!c)return; if(c.state==='suspended')c.resume();
  // iOS/mobile: kick the context awake with a 1-sample silent buffer (reliable unlock)
  if(!unlock._k){ try{ const b=c.createBufferSource(); b.buffer=c.createBuffer(1,1,22050); b.connect(c.destination); b.start(0); unlock._k=1; }catch(e){} }
  initAudioGraph(); if(!S.muted)startMusic(); }
const sndPick =()=>beep(540,0.08,'triangle',0.16,760);
const sndMatch=()=>{ [523,659,784].forEach((f,i)=>setTimeout(()=>beep(f,0.2,'triangle',0.24),i*60)); };
const sndErr  =()=>beep(170,0.18,'sawtooth',0.18,90);
const sndWin  =()=>{ [523,659,784,1046,1318].forEach((f,i)=>setTimeout(()=>beep(f,0.22,'triangle',0.28),i*90)); };
const sndOver =()=>{ beep(400,0.5,'sawtooth',0.3,80); setTimeout(()=>beep(200,0.45,'sawtooth',0.24,60),180); };
// haptics
function buzz(p){ if(navigator.vibrate){ try{ navigator.vibrate(p); }catch(e){} } }

// ---------------- three setup ----------------
const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:false,powerPreference:'high-performance'});
renderer.outputColorSpace=THREE.SRGBColorSpace;
renderer.toneMapping=THREE.NeutralToneMapping; renderer.toneMappingExposure=1.18;
renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;   // real cast shadows → clear physical stacking
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(48, 1, 0.1, 100);
const camTarget={ pos:new THREE.Vector3(0,9,12), look:new THREE.Vector3(0,0,1) };

// vibrant nebula backdrop (matches the key-art banner: navy + colour glows + sparkles)
(function(){ const s=512, cv=document.createElement('canvas'); cv.width=cv.height=s; const g=cv.getContext('2d');
  // pure deep-space BLACK (no colour tint) + scattered stars
  g.fillStyle='#000000'; g.fillRect(0,0,s,s);
  let rg=g.createRadialGradient(s*0.5,s*0.45,s*0.05,s*0.5,s*0.5,s*0.8);
  rg.addColorStop(0,'#0a0a0c'); rg.addColorStop(1,'#000000');
  g.fillStyle=rg; g.fillRect(0,0,s,s);
  for(let i=0;i<160;i++){ const r=Math.random()*1.4+0.2; g.globalAlpha=Math.random()*0.65+0.15; g.fillStyle='#ffffff'; g.beginPath(); g.arc(Math.random()*s,Math.random()*s,r,0,6.28); g.fill(); }
  for(let i=0;i<8;i++){ g.globalAlpha=0.95; g.fillStyle='#ffffff'; g.beginPath(); g.arc(Math.random()*s,Math.random()*s,Math.random()*1.4+1.2,0,6.28); g.fill(); }
  g.globalAlpha=1;
  const tex=new THREE.CanvasTexture(cv); tex.colorSpace=THREE.SRGBColorSpace; scene.background=tex; })();
// soft studio environment → clean glossy candy reflections (premium, not glary)
scene.environment=(function(){ const cv=document.createElement('canvas'); cv.width=256; cv.height=128; const g=cv.getContext('2d');
  const grd=g.createLinearGradient(0,0,0,128); grd.addColorStop(0,'#ffffff'); grd.addColorStop(0.32,'#ffffff'); grd.addColorStop(0.5,'#cfd8f0'); grd.addColorStop(0.72,'#6b7aa6'); grd.addColorStop(1,'#2a3252');
  g.fillStyle=grd; g.fillRect(0,0,256,128);
  // a brighter band → polished tiles catch a clean reflection streak
  g.fillStyle='rgba(255,255,255,0.9)'; g.fillRect(0,Math.round(128*0.18),256,Math.round(128*0.12));
  const tex=new THREE.CanvasTexture(cv); tex.mapping=THREE.EquirectangularReflectionMapping; tex.colorSpace=THREE.SRGBColorSpace;
  const pm=new THREE.PMREMGenerator(renderer); const env=pm.fromEquirectangular(tex).texture; tex.dispose(); pm.dispose(); return env; })();

// lights — neutral key + fill + ambient for TRUE, sharp albedo colors (no glow, no tint)
const hemi=new THREE.HemisphereLight(0xf2f2f5,0x0a0a0c,0.55); scene.add(hemi);
const amb=new THREE.AmbientLight(0xffffff,0.35); scene.add(amb);
const _lowGpu=(matchMedia&&matchMedia('(pointer:coarse)').matches)||Math.min(window.innerWidth,window.innerHeight)<620;
const key=new THREE.DirectionalLight(0xffffff,1.9); key.position.set(3.5,11,5); key.castShadow=true; scene.add(key);
key.shadow.mapSize.set(_lowGpu?1024:2048,_lowGpu?1024:2048); key.shadow.camera.near=2; key.shadow.camera.far=40;
key.shadow.camera.left=-9; key.shadow.camera.right=9; key.shadow.camera.top=9; key.shadow.camera.bottom=-9;
key.shadow.bias=-0.0004; key.shadow.normalBias=0.02; key.shadow.radius=3;
const fill=new THREE.DirectionalLight(0xffffff,0.5); fill.position.set(-5,4,-2); scene.add(fill);

// soft floor receives the cast shadows (grounds the pile clearly on the bright bg)
const floorMat=new THREE.MeshStandardMaterial({color:0x070709,metalness:0.0,roughness:0.96});
const floor=new THREE.Mesh(new THREE.CircleGeometry(26,64),floorMat); floor.rotation.x=-Math.PI/2; floor.position.y=-0.6; floor.receiveShadow=true; scene.add(floor);

// ambient floaty motes
const motes=(function(){ const n=90,g=new THREE.BufferGeometry(),pos=new Float32Array(n*3);
  for(let i=0;i<n;i++){ pos[i*3]=(Math.random()-0.5)*26; pos[i*3+1]=Math.random()*12-1; pos[i*3+2]=(Math.random()-0.5)*22; }
  g.setAttribute('position',new THREE.BufferAttribute(pos,3));
  const m=new THREE.PointsMaterial({color:0x8fe6d4,size:0.06,transparent:true,opacity:0.5,depthWrite:false,blending:THREE.AdditiveBlending});
  const pts=new THREE.Points(g,m); scene.add(pts); return pts; })();


// ---------------- icon textures ----------------
const iconCache={};
function iconTexture(type){ if(iconCache[type])return iconCache[type];
  const s=160, cv=document.createElement('canvas'); cv.width=cv.height=s; const g=cv.getContext('2d');
  g.clearRect(0,0,s,s); g.font=Math.round(s*0.66)+'px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif';
  g.textAlign='center'; g.textBaseline='middle'; g.fillText(SYMBOLS[type%SYMBOLS.length], s/2, s/2+s*0.04);
  const tex=new THREE.CanvasTexture(cv); tex.colorSpace=THREE.SRGBColorSpace; tex.anisotropy=4; iconCache[type]=tex; return tex; }

// ---------------- tile factory ----------------
const TILE=1.0, GEO=new RoundedBoxGeometry(TILE,TILE*0.72,TILE,4,0.12);   // boxy cube, edges chamfered (not sharp, not too round)
const ICON_GEO=new THREE.PlaneGeometry(TILE*0.6,TILE*0.6);
const tileGroup=new THREE.Group(); scene.add(tileGroup);

function makeTileMesh(type){
  const f=FACES[type%FACES.length];
  const mat=new THREE.MeshPhysicalMaterial({color:f.b,roughness:0.26,metalness:0.0,
    clearcoat:1.0,clearcoatRoughness:0.05,sheen:0.5,sheenRoughness:0.35,sheenColor:new THREE.Color(0xffffff),
    specularIntensity:1.0,envMapIntensity:1.0,emissive:f.b,emissiveIntensity:0.06});   // polished, premium, vivid
  const box=new THREE.Mesh(GEO,mat); box.castShadow=true; box.receiveShadow=true;
  const icon=new THREE.Mesh(ICON_GEO,new THREE.MeshBasicMaterial({map:iconTexture(type),transparent:true,depthWrite:false}));
  icon.rotation.x=-Math.PI/2; icon.position.y=TILE*0.365;
  const grp=new THREE.Group(); grp.add(box); grp.add(icon);
  grp.userData={mat,box,icon,baseEmissive:0.08};
  return grp;
}

// ---------------- layout / generation ----------------
let layout={ originX:0, originZ:0, step:1.34, trayY:0.35, trayZ:0, traySpan:0 };
let SLOTS=7;   // tray slots — fewer on phones (set per device in computeBounds)

function rnd(n){ return Math.floor(Math.random()*n); }
function shuffleArr(a){ for(let i=a.length-1;i>0;i--){ const j=rnd(i+1); [a[i],a[j]]=[a[j],a[i]]; } return a; }

function clearTiles(){ for(const t of S.tiles){ tileGroup.remove(t.grp); } S.tiles=[]; S.trayArr=[]; }

function generate(level){
  clearTiles(); S.history=[]; S.over=false; S.won=false; S.busy=false;
  const layers=Math.min(5,2+Math.floor((level+1)/2));
  const typeCount=Math.min(SYMBOLS.length,5+level);
  // pile footprint MATCHES the device rectangle (wide on desktop, taller on phones)
  const a=(window.innerWidth/window.innerHeight)||0.5;
  let cols0,rows0;
  if(a<0.72){ cols0=4; rows0=7; }            // portrait — 4 wide to fill the FULL screen width
  else if(a<1.25){ cols0=5; rows0=4; }       // square-ish
  else if(a<1.8){ cols0=7; rows0=3; }        // landscape — wide
  else { cols0=9; rows0=3; }                 // ultra-wide
  const step=layout.step;
  const offX=-(cols0-1)*step/2, offZ=-(rows0-1)*step/2;
  // build a grid of cells, then STACK tiles into columns (each upper tile rests on
  // the surface of the one below — supported, slightly offset, never interleaved)
  // grid cells with a little built-in jitter so the whole thing isn't a rigid grid
  const cells=[]; for(let r=0;r<rows0;r++) for(let c=0;c<cols0;c++) cells.push({x:offX+c*step+(Math.random()-0.5)*0.1, z:offZ+r*step+0.3+(Math.random()-0.5)*0.1});
  const positions=[], height=cells.map(()=>0);
  for(let i=0;i<cells.length;i++){ positions.push({x:cells[i].x+(Math.random()-0.5)*0.16, z:cells[i].z+(Math.random()-0.5)*0.16, layer:0}); height[i]=1; }
  for(let L=1;L<layers;L++){ const dens=0.42-(L-1)*0.12;
    for(let i=0;i<cells.length;i++){ if(height[i]===L && Math.random()<dens){ height[i]++;
      positions.push({x:cells[i].x+(Math.random()-0.5)*0.36, z:cells[i].z+(Math.random()-0.5)*0.36, layer:L}); } } }
  // trim to a multiple of 3 by dropping a few TOP tiles (keeps every stack supported)
  positions.sort((p,q)=>q.layer-p.layer); positions.splice(0, positions.length%3);
  const count=positions.length, slots=positions;
  const bag=[]; for(let i=0;i<count/3;i++){ const tp=rnd(typeCount); bag.push(tp,tp,tp); } shuffleArr(bag);
  let id=0;
  for(let i=0;i<slots.length;i++){
    const p=slots[i], type=bag[i];
    const grp=makeTileMesh(type);
    const home=new THREE.Vector3(p.x, -0.06 + p.layer*(TILE*0.72+0.06) + (Math.random()-0.5)*0.04, p.z);   // sit on the surface below + small seam
    grp.position.copy(home); grp.position.y+=6; grp.scale.setScalar(0.01); // drop-in anim
    grp.rotation.y=(Math.random()-0.5)*0.5;   // random spin → natural, un-arranged
    tileGroup.add(grp);
    S.tiles.push({ id:id++, type, gx:p.x, gz:p.z, layer:p.layer, taken:false, gone:false,
      grp, home, state:'wait', vy:0, squash:0, bounces:0, dropping:false, introDelay:p.layer*0.13 + Math.random()*0.16, t:0, slot:-1, pop:0 });
  }
  computeBounds(); fitContent();
}

// a tile is free if no higher-layer live tile overlaps its footprint
function isFree(t){
  if(t.taken||t.gone) return false;
  for(const o of S.tiles){ if(o===t||o.taken||o.gone) continue; if(o.layer<=t.layer) continue;
    if(Math.abs(o.gx-t.gx)<layout.step*0.6 && Math.abs(o.gz-t.gz)<layout.step*0.6) return false; }
  return true;
}

// ---------------- camera framing (scientific auto-fit) ----------------
// The WORLD layout is device-independent; the camera distance is solved so the
// whole play content fits any screen/aspect with comfortable margins.
function computeBounds(){
  let minX=1e9,maxX=-1e9,minZ=1e9,maxZ=-1e9,maxY=-1e9;
  for(const t of S.tiles){ if(t.gone)continue; minX=Math.min(minX,t.home.x);maxX=Math.max(maxX,t.home.x);minZ=Math.min(minZ,t.home.z);maxZ=Math.max(maxZ,t.home.z);maxY=Math.max(maxY,t.home.y); }
  if(!isFinite(minX)){ minX=-2.5;maxX=2.5;minZ=-2.5;maxZ=1.5;maxY=0.4; }
  const pileW=maxX-minX;
  // fewer tray slots on phones (less clutter, bigger), more on desktop
  const a=camera.aspect; SLOTS = a<0.72 ? 5 : (a<1.25 ? 6 : 7);
  // tray spans the full pile width → big slots, big in-slot tiles
  layout.traySpan=Math.max(SLOTS*0.66,Math.min(9.0,pileW));
  layout.trayGap=layout.traySpan/SLOTS; layout.trayScale=layout.trayGap*0.9;
  layout.trayZ=maxZ+1.9; layout.dockTop=0.0; layout.trayY=TILE*0.36*layout.trayScale + 0.05;  // clear GAP from the pile; tile sits on the bright slot ring
  buildTrayDock();
  for(let i=0;i<S.trayArr.length;i++) S.trayArr[i].home.copy(trayPos(i));
  // content bounds = pile ∪ FULL tray dock (incl. glow halo + stack height) → always fully on-screen
  const tw=layout.traySpan/2+0.5;
  layout.cMinX=Math.min(minX-0.7,-tw); layout.cMaxX=Math.max(maxX+0.7,tw);
  layout.cMinZ=minZ-0.8; layout.cMaxZ=layout.trayZ+layout.trayGap/2+0.95;
  layout.cMinY=-0.7; layout.cMaxY=maxY+0.4;
}
function fitContent(){
  const a=camera.aspect;
  // Viewing pitch by device: phones tilt DOWN more (moderate 3D, less oblique →
  // the grid spreads to fill the tall frame); landscape uses a lower angle.
  let pitchY, fov;
  if(a<0.72){ pitchY=2.5; fov=48; }        // portrait — top-down enough to fill, still shows stacking
  else if(a<1.25){ pitchY=1.8; fov=44; }   // square-ish
  else { pitchY=1.15; fov=40; }            // landscape — cinematic lower angle
  const dir=new THREE.Vector3(0,pitchY,1).normalize();
  camera.fov=fov; camera.updateProjectionMatrix();
  const C=new THREE.Vector3((layout.cMinX+layout.cMaxX)/2, 0.0, (layout.cMinZ+layout.cMaxZ)/2);
  const pts=[]; for(const x of[layout.cMinX,layout.cMaxX]) for(const z of[layout.cMinZ,layout.cMaxZ]) for(const y of[layout.cMinY,layout.cMaxY]) pts.push(new THREE.Vector3(x,y,z));
  // FILL: solve the distance so the content reaches the safe margins (no big empty
  // borders). Extra top margin keeps the pile clear of the HUD chips.
  const portrait=a<0.72; const mx=(portrait?1.0:0.97), myTop=0.92, myBot=0.99, tmp=new THREE.Vector3(); let d=12;
  for(let it=0;it<6;it++){ camera.position.copy(C).addScaledVector(dir,d); camera.lookAt(C);
    camera.updateMatrixWorld(); camera.matrixWorldInverse.copy(camera.matrixWorld).invert();
    let m=0.0001; for(const p of pts){ tmp.copy(p).project(camera); const xx=Math.abs(tmp.x)/mx, yy=(tmp.y>0?tmp.y/myTop:-tmp.y/myBot);
      m=Math.max(m, portrait?xx:Math.max(xx,yy)); }   // portrait → fill the FULL width (100%), no side gap
    d*=m; }
  camTarget.pos.copy(C).addScaledVector(dir,d); camTarget.look.copy(C);
  // ANCHOR the tray to the bottom of the screen: pan vertically until the tray's
  // front edge sits near the bottom margin (extra space, if any, goes to the top).
  const anchor=new THREE.Vector3(0, layout.dockTop-0.35, layout.cMaxZ-0.2);
  for(let k=0;k<6;k++){ camera.position.copy(camTarget.pos); camera.lookAt(camTarget.look);
    camera.updateMatrixWorld(); camera.matrixWorldInverse.copy(camera.matrixWorld).invert();
    const ndcy=anchor.clone().project(camera).y, err=ndcy-(-0.955);
    if(Math.abs(err)<0.01) break;
    const halfH=d*Math.tan(THREE.MathUtils.degToRad(camera.fov)/2);
    camTarget.pos.y+=err*halfH; camTarget.look.y+=err*halfH; }
  if(S.phase!=='intro'){ camera.position.copy(camTarget.pos); camera.lookAt(camTarget.look); }
}
function layoutTray(){ computeBounds(); }
function trayPos(i){ const n=SLOTS,gap=layout.trayGap||0.94; return new THREE.Vector3((i-(n-1)/2)*gap, layout.trayY, layout.trayZ); }

// ---------------- premium TRAY DOCK (separated from the pile) ----------------
const trayDock=new THREE.Group(); scene.add(trayDock);
function buildTrayDock(){
  while(trayDock.children.length){ const c=trayDock.children[0]; trayDock.remove(c); }
  const n=SLOTS, gap=layout.trayGap||0.94, span=layout.traySpan||6.6, topY=layout.dockTop, z=layout.trayZ;
  const tileW=(layout.trayScale||0.82)*TILE;
  const baseW=span+0.45, baseD=tileW+0.7;
  // BRIGHT glossy bar — clean & premium, NOT a dim trough
  const bar=new THREE.Mesh(new RoundedBoxGeometry(baseW,0.26,baseD,5,0.13),
    new THREE.MeshPhysicalMaterial({color:0xcdd6f2,roughness:0.22,metalness:0.1,clearcoat:1.0,clearcoatRoughness:0.08,envMapIntensity:0.8}));
  bar.position.set(0,topY-0.13,z); bar.receiveShadow=true; trayDock.add(bar);
  // colourful glowing slot rings (bright, creative) + dark inset where the tile drops
  const padGeo=new RoundedBoxGeometry(tileW+0.2,0.08,tileW+0.2,4,0.16);
  const insGeo=new RoundedBoxGeometry(tileW+0.02,0.1,tileW+0.02,4,0.14);
  const insMat=new THREE.MeshStandardMaterial({color:0x121426,roughness:0.7,metalness:0,emissive:0x0a0c18,emissiveIntensity:0.3});
  const cols=[0x4ee0d0,0xffd15f,0xff7eb0,0x9a8cff,0x6be39a,0x5bc8ff,0xff9e78];
  for(let i=0;i<n;i++){ const x=(i-(n-1)/2)*gap;
    const ring=new THREE.Mesh(padGeo,new THREE.MeshStandardMaterial({color:0x0a0e16,emissive:cols[i%cols.length],emissiveIntensity:0.95,roughness:0.4,metalness:0}));
    ring.position.set(x,topY+0.01,z); trayDock.add(ring);
    const ins=new THREE.Mesh(insGeo,insMat); ins.position.set(x,topY+0.03,z); trayDock.add(ins); }
}
function buildTrayFrames(){ buildTrayDock(); }

// ---------------- gameplay ----------------
function startGame(){ S.score=0; S.level=1; S.undo=3; S.shuffle=3; S.started=true; S.over=false; S.won=false;
  generate(S.level); buildTrayFrames(); refreshHUD(); hide('menu'); hide('result'); unlock(); beginIntro(); }
function nextLevel(){ S.level++; S.undo=Math.min(5,S.undo+1); S.shuffle=Math.min(5,S.shuffle+1);
  generate(S.level); buildTrayFrames(); refreshHUD(); hide('result'); dropTiles(); S.phase='play'; }

// 3s cinematic intro: orbit/focus, THEN tiles drop in
function beginIntro(){ S.phase='intro'; S.introT=0; for(const t of S.tiles){ t.state='wait'; t.grp.scale.setScalar(0.001); } }
function dropTiles(){ for(const t of S.tiles){ t.state='intro'; t.t=0; t.vy=0; t.bounces=0; t.dropping=false; t.squash=0; } }

function pickTile(t){
  if(S.over || S.phase!=='play') return;
  if(!isFree(t)){ sndErr(); buzz(22); bump(t); return; }
  if(S.trayArr.length>=SLOTS) return;
  t.taken=true; t.slot=S.trayArr.length; t.home.copy(trayPos(t.slot)); S.trayArr.push(t); t.state='fly'; t.vy=7.2; t.pop=0.5;
  S.history.push(t.id); sndPick(); buzz(9);
}

// called when a flying tile actually settles into its tray slot
function onTileLanded(t){ checkTray(); }
function landedCount(){ return S.trayArr.filter(t=>t.state==='tray').length; }
function checkTray(){
  if(S.busy) return;
  const landed=S.trayArr.filter(t=>t.state==='tray'); const cnt={};
  for(const t of landed) cnt[t.type]=(cnt[t.type]||0)+1;
  let mt=-1; for(const k in cnt){ if(cnt[k]>=3){ mt=+k; break; } }
  if(mt>=0){ S.busy=true; setTimeout(()=>{ S.busy=false; clearTriple(); }, 170); return; }  // let the 3rd tile rest fully in the tray first
  if(S.trayArr.length>=SLOTS && S.trayArr.every(t=>t.state==='tray')) gameOver();
  refreshHUD();
}
function clearTriple(){
  const landed=S.trayArr.filter(t=>t.state==='tray'); const cnt={};
  for(const t of landed) cnt[t.type]=(cnt[t.type]||0)+1;
  let mt=-1; for(const k in cnt){ if(cnt[k]>=3){ mt=+k; break; } }
  if(mt<0){ if(S.trayArr.length>=SLOTS && S.trayArr.every(t=>t.state==='tray')) gameOver(); refreshHUD(); return; }
  let need=3; const removing=[];
  S.trayArr=S.trayArr.filter(t=>{ if(t.type===mt && t.state==='tray' && need>0){ need--; removing.push(t); return false; } return true; });
  for(const t of removing){ t.state='pop'; t.t=0; burst(t.grp.position,t.type); }
  S.score+=30; sndMatch(); buzz([0,18,40,28]); showCombo('MATCH!'); flash(0.3); shake(0.55);
  reindexTray(); refreshHUD();
  if(!S.tiles.some(x=>!x.taken&&!x.gone) && S.trayArr.length===0){ S.won=true; winLevel(); return; }
  setTimeout(()=>checkTray(), 60);   // chain combos after tiles resettle
}
// shift remaining tray tiles to slots 0..n-1 (landed ones hop to the new slot)
function reindexTray(){ for(let i=0;i<S.trayArr.length;i++){ const t=S.trayArr[i]; t.slot=i; t.home.copy(trayPos(i));
  if(t.state==='tray'){ t.state='fly'; t.vy=2.6; } } }

function winLevel(){ S.score+=100+S.level*20; if(S.score>S.best){ S.best=S.score; saveBest(); }
  refreshHUD(); sndWin(); buzz([0,40,60,40,60,80]); confetti(); setTimeout(()=>showResult(true),700); }
function gameOver(){ if(S.over) return; S.over=true; if(S.score>S.best){ S.best=S.score; saveBest(); }
  refreshHUD(); sndOver(); buzz([0,80,40,120]); shake(1.2); setTimeout(()=>showResult(false),450); }

function doUndo(){ if(S.over||S.phase!=='play'||S.undo<=0||S.history.length===0) return;
  const id=S.history.pop(); const idx=S.trayArr.findIndex(t=>t.id===id); if(idx<0)return;
  const t=S.trayArr.splice(idx,1)[0]; t.taken=false; t.state='return'; t.vy=6; S.undo--; sndPick(); reindexTray(); refreshHUD(); }
function doShuffle(){ if(S.over||S.phase!=='play'||S.shuffle<=0) return;
  const live=S.tiles.filter(t=>!t.taken&&!t.gone); const types=shuffleArr(live.map(t=>t.type));
  live.forEach((t,i)=>{ t.type=types[i]; const f=FACES[t.type%FACES.length]; t.grp.userData.mat.color.setHex(f.b);
    t.grp.userData.icon.material.map=iconTexture(t.type); t.grp.userData.icon.material.needsUpdate=true; t.pop=0.7; });
  S.shuffle--; beep(320,0.12,'triangle',0.16,540); refreshHUD(); }

// ---------------- physics + particles ----------------
const GRAVITY=30;                 // units/s^2 — realistic fall acceleration
function setScaleSquash(g,base,sq){ const sy=base*(1-0.34*sq), sxz=base*(1+0.22*sq); g.scale.set(sxz,sy,sxz); }
const PGEO=new THREE.IcosahedronGeometry(0.09,0); const pPool=[]; const pLive=[];
function getP(){ let m=pPool.pop(); if(!m){ m=new THREE.Mesh(PGEO,new THREE.MeshBasicMaterial({color:0xffffff})); scene.add(m); } m.visible=true; return m; }
function spawnDust(pos,amt){ const n=Math.round(4+amt*7); for(let i=0;i<n;i++){ const m=getP();
  m.material.color.setHex(0xcfe9ff); m.position.set(pos.x+(Math.random()-0.5)*0.5,pos.y+0.04,pos.z+(Math.random()-0.5)*0.5);
  const a=Math.random()*6.28, sp=0.6+Math.random()*1.6*amt; pLive.push({m,vx:Math.cos(a)*sp,vy:0.4+Math.random()*1.2,vz:Math.sin(a)*sp,life:0.45,sc:0.6}); } }
function burst(pos,type){ const e=FACES[type%FACES.length].e; for(let i=0;i<14;i++){ const m=getP();
  m.material.color.setHex(Math.random()<0.5?e:0xffffff); m.position.copy(pos);
  const a=Math.random()*6.28, sp=2+Math.random()*4; pLive.push({m,vx:Math.cos(a)*sp,vy:2+Math.random()*4,vz:Math.sin(a)*sp,life:1,sc:1}); } }
function confetti(){ for(let i=0;i<90;i++){ const m=getP(); const e=FACES[rnd(FACES.length)].e;
  m.material.color.setHex(e); m.position.set((Math.random()-0.5)*6,5+Math.random()*2,(Math.random()-0.5)*4);
  pLive.push({m,vx:(Math.random()-0.5)*6,vy:Math.random()*3,vz:(Math.random()-0.5)*6,life:1.6,sc:1.3}); } }
function updateParts(dt){ for(let i=pLive.length-1;i>=0;i--){ const p=pLive[i];
  p.vy-=9*dt; p.m.position.x+=p.vx*dt; p.m.position.y+=p.vy*dt; p.m.position.z+=p.vz*dt; p.life-=dt*1.4;
  const s=Math.max(0.001,p.life)*p.sc; p.m.scale.setScalar(s);
  if(p.life<=0){ p.m.visible=false; pPool.push(p.m); pLive.splice(i,1); } } }

// ---------------- input ----------------
const ray=new THREE.Raycaster(); const ndc=new THREE.Vector2();
function onPointer(e){ if(!S.started||S.over||S.busy) return; const r=canvas.getBoundingClientRect(); const px=e.clientX-r.left, py=e.clientY-r.top;
  ndc.x=(px/r.width)*2-1; ndc.y=-(py/r.height)*2+1; ray.setFromCamera(ndc,camera);
  const meshes=S.tiles.filter(t=>!t.taken&&!t.gone).map(t=>t.grp.userData.box);
  const hit=ray.intersectObjects(meshes,false);
  if(hit.length){ const box=hit[0].object; const t=S.tiles.find(x=>x.grp.userData.box===box); if(t){ pickTile(t); } } }
canvas.addEventListener('pointerdown',(e)=>{ e.preventDefault(); unlock(); onPointer(e); },{passive:false});

// ---------------- camera shake ----------------
let shakeAmt=0;
function shake(v){ shakeAmt=Math.min(1.4,shakeAmt+v); }
function bump(t){ t.pop=0.5; }

// ---------------- HUD / overlays ----------------
function refreshHUD(){ document.getElementById('ui-level').textContent=S.level;
  document.getElementById('ui-score').textContent=S.score; document.getElementById('ui-best').textContent=S.best;
  document.getElementById('undoN').textContent=S.undo; document.getElementById('shuffleN').textContent=S.shuffle;
  document.getElementById('undoBtn').classList.toggle('off',S.undo<=0||S.history.length===0);
  document.getElementById('shuffleBtn').classList.toggle('off',S.shuffle<=0); }
let comboT=null;
function showCombo(txt){ const el=document.getElementById('combo'); el.textContent=txt; el.style.opacity=1; el.style.transform='translateX(-50%) scale(1.15)';
  clearTimeout(comboT); comboT=setTimeout(()=>{el.style.opacity=0;el.style.transform='translateX(-50%) scale(.5)';},700); }
function flash(v){ const f=document.getElementById('flash'); f.style.transition='none'; f.style.opacity=v;
  requestAnimationFrame(()=>{ f.style.transition='opacity .5s'; f.style.opacity=0; }); }
function hide(id){ const el=document.getElementById(id); el.classList.add('hidden'); clearTimeout(el._ht); el._ht=setTimeout(()=>{ el.style.display='none'; },420); }
function show(id){ const el=document.getElementById(id); clearTimeout(el._ht); el.style.display=''; void el.offsetWidth; el.classList.remove('hidden'); }
function showResult(win){ document.getElementById('resTitle').textContent=win?'LEVEL CLEAR':'GAME OVER';
  document.getElementById('res-score').textContent=S.score; document.getElementById('res-best').textContent=S.best;
  document.getElementById('newbestLine').style.display=(S.score>=S.best&&S.score>0)?'':'none';
  document.getElementById('resBtn').textContent=win?'CONTINUE ▶':'PLAY AGAIN ↻'; show('result'); }

document.getElementById('startBtn').addEventListener('click',startGame);
document.getElementById('resBtn').addEventListener('click',()=>{ if(S.won)nextLevel(); else startGame(); });
document.getElementById('undoBtn').addEventListener('click',doUndo);
document.getElementById('shuffleBtn').addEventListener('click',doShuffle);
const muteBtn=document.getElementById('muteBtn');
function drawMute(){ muteBtn.querySelector('.ic').textContent=S.muted?'🔇':'🔊'; }
muteBtn.addEventListener('click',()=>{ S.muted=!S.muted; drawMute(); if(S.muted){ musicNodes.forEach(o=>{try{o.stop();}catch(e){}}); musicNodes=[]; } else { startMusic(); } });
// single toggle reveals the tools (undo / shuffle / mute)
const toolsEl=document.getElementById('tools'), menuToggle=document.getElementById('menuToggle');
menuToggle.addEventListener('click',()=>{ toolsEl.classList.toggle('closed'); menuToggle.textContent=toolsEl.classList.contains('closed')?'☰':'✕'; });

// ---------------- resize ----------------
let W=1,H=1;
function resize(){ W=window.innerWidth; H=window.innerHeight; const dpr=Math.min(2,window.devicePixelRatio||1);
  renderer.setPixelRatio(dpr); renderer.setSize(W,H,false); camera.aspect=W/H; camera.updateProjectionMatrix();
  computeBounds(); fitContent(); }
window.addEventListener('resize',resize);
window.addEventListener('orientationchange',()=>setTimeout(resize,200));

// ---------------- main loop ----------------
const clock=new THREE.Clock();
function ease(a,b,k){ return a+(b-a)*k; }
function animate(){
  const dt=Math.min(0.05,clock.getDelta()); const tnow=clock.elapsedTime;
  // tiles
  for(let i=S.tiles.length-1;i>=0;i--){ const t=S.tiles[i]; const g=t.grp;
    if(t.squash>0){ t.squash=Math.max(0, t.squash - dt*5.5); }   // squash recovery
    if(t.state==='wait'){ /* held off-stage until the intro finishes */ }
    else if(t.state==='intro'){
      t.t+=dt;
      if(t.t>=t.introDelay){
        if(!t.dropping){ t.dropping=true; g.position.set(t.home.x,t.home.y+6.5,t.home.z); g.scale.setScalar(1); t.vy=0; }
        t.vy-=GRAVITY*dt; g.position.y+=t.vy*dt;
        if(g.position.y<=t.home.y){ g.position.y=t.home.y; const imp=Math.min(1,-t.vy/12);
          if(-t.vy>2.4 && (t.bounces|0)<1){ t.bounces=(t.bounces|0)+1; t.vy=-t.vy*0.34; t.squash=Math.max(t.squash,imp*0.7); }
          else { t.vy=0; t.state='board'; t.squash=Math.max(t.squash,imp); if(imp>0.3){ shake(imp*0.35); buzz(Math.round(imp*16)); spawnDust(g.position,imp); } }
        }
        // stretch while falling fast, then squash on land
        const stretch=t.vy<0?Math.min(0.18,-t.vy*0.012):0; g.scale.set((1-stretch*0.5)*(1+0.22*t.squash),(1+stretch)*(1-0.34*t.squash),(1-stretch*0.5)*(1+0.22*t.squash));
      }
    }
    else if(t.state==='board'){ const free=isFree(t);
        const ty=t.home.y+(free?Math.sin(tnow*2.2+t.gx+t.gz)*0.05:0); g.position.y=ease(g.position.y,ty,0.2);
        let base=1; if(t.pop>0){ base=1+0.12*t.pop; t.pop*=0.86; if(t.pop<0.02)t.pop=0; }
        setScaleSquash(g,base,t.squash); }
    else if(t.state==='fly'||t.state==='return'){
        g.position.x=ease(g.position.x,t.home.x,0.26); g.position.z=ease(g.position.z,t.home.z,0.26);
        t.vy-=GRAVITY*dt; g.position.y+=t.vy*dt;
        const dxz=Math.hypot(g.position.x-t.home.x,g.position.z-t.home.z);
        if(g.position.y<=t.home.y){ g.position.y=t.home.y;
          if(dxz<0.1){ const imp=Math.min(1,-t.vy/12); t.vy=0; const wasReturn=(t.state==='return'); t.state=wasReturn?'board':'tray';
            t.squash=Math.max(t.squash,Math.max(0.4,imp)); shake(0.3); buzz(16); spawnDust(g.position,0.8); if(!wasReturn) onTileLanded(t); }
          else { t.vy=0; }
        }
        const stretch=t.vy>0?Math.min(0.25,t.vy*0.03):0;
        const fb=(t.state==='return')?1:(layout.trayScale||0.82);   // shrink to fit the slot while flying in
        const cur=ease(g.scale.x/(1+0.22*t.squash), fb, 0.2);       // ease base scale toward target
        g.scale.set(cur*(1-stretch*0.6)*(1+0.22*t.squash),cur*(1+stretch)*(1-0.34*t.squash),cur*(1-stretch*0.6)*(1+0.22*t.squash));
        g.rotation.y=ease(g.rotation.y,0,0.22); }
    else if(t.state==='tray'){ const tp=trayPos(t.slot); t.home.copy(tp);
        g.position.x=ease(g.position.x,tp.x,0.25); g.position.z=ease(g.position.z,tp.z,0.25);
        g.position.y=ease(g.position.y, tp.y+Math.sin(tnow*3+t.slot)*0.02, 0.3); setScaleSquash(g,layout.trayScale||0.82,t.squash); }
    else if(t.state==='pop'){ t.t+=dt*3; const s=Math.max(0.001,1.35-t.t*1.7); g.scale.setScalar(s); g.position.y+=dt*1.6; g.rotation.y+=dt*7;
        if(t.t>=1){ t.gone=true; tileGroup.remove(g); S.tiles.splice(i,1); } }
  }
  // motes drift
  motes.rotation.y += dt*0.02; motes.position.y = Math.sin(tnow*0.3)*0.3;
  // camera: cinematic intro orbit → anchored play view (+ shake)
  if(S.phase==='intro'){
    S.introT+=dt; const dur=3.0; let e=Math.min(1,S.introT/dur); e=e<0.5?2*e*e:1-Math.pow(-2*e+2,2)/2;
    const look=camTarget.look, base=camTarget.pos.clone().sub(look);
    const ang=(1-e)*Math.PI*1.15, lift=(1-e)*4.5, out=1+(1-e)*0.55;
    const cx=base.x*Math.cos(ang)-base.z*Math.sin(ang), cz=base.x*Math.sin(ang)+base.z*Math.cos(ang);
    camera.position.set(look.x+cx*out, look.y+base.y*out+lift, look.z+cz*out); camera.lookAt(look);
    if(S.introT>=dur){ S.phase='play'; camera.position.copy(camTarget.pos); camera.lookAt(camTarget.look); dropTiles(); }
  } else {
    camera.position.copy(camTarget.pos);
    if(shakeAmt>0){ camera.position.x+=(Math.random()-0.5)*shakeAmt*0.12; camera.position.y+=(Math.random()-0.5)*shakeAmt*0.1; shakeAmt*=0.86; if(shakeAmt<0.02)shakeAmt=0; }
    camera.lookAt(camTarget.look);
  }
  updateParts(dt);
  renderer.render(scene,camera);
  requestAnimationFrame(animate);
}

// ---------------- boot ----------------
loadBest(); drawMute(); resize(); refreshHUD(); animate();
document.getElementById('loading').classList.add('hidden');
['pointerdown','pointerup','touchstart','touchend','click','keydown'].forEach(ev=>window.addEventListener(ev,unlock,{passive:true}));
</script>
