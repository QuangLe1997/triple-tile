<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

<meta name="description" content="Triple Match 3D — a glossy neon 3D tile-matching puzzle. Tap shiny 3D blocks into the tray and match 3 of a kind. Smooth effects, bloom glow, juicy mobile fun." />

<style>
  :root{
    --mint:#54d6b2; --gold:#e7c06a; --rose:#e493ac; --cream:#f0ead8;
    --bg:#080b12; --ink:#eef2f3; --muted:#94a3ad;
    --panel:rgba(14,19,28,.82); --line:rgba(255,255,255,.12);
    --font:'Segoe UI',system-ui,-apple-system,Arial,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font-family:var(--font);overflow:hidden;
    user-select:none;-webkit-user-select:none;touch-action:none;}
  #c{position:fixed;inset:0;display:block;width:100%;height:100%;}

  #hud{position:fixed;left:0;right:0;top:max(10px,env(safe-area-inset-top));z-index:9;
    display:flex;gap:9px;justify-content:center;align-items:center;pointer-events:none;padding:0 12px;}
  .chip{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:7px 15px;min-width:72px;
    text-align:center;backdrop-filter:blur(12px);box-shadow:0 10px 26px rgba(0,0,0,.45);}
  .chip .l{font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
  .chip .v{font-size:20px;font-weight:800;line-height:1.15;}
  .chip.score .v{color:var(--mint);} .chip.best .v{color:var(--gold);} .chip.level .v{color:var(--rose);}

  #tools{position:fixed;right:max(12px,env(safe-area-inset-right));bottom:max(16px,calc(env(safe-area-inset-bottom) + 12px));
    z-index:11;display:flex;flex-direction:column;gap:11px;}
  .tool{width:50px;height:50px;border-radius:16px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:1px;background:var(--panel);border:1px solid var(--line);color:var(--ink);backdrop-filter:blur(12px);
    box-shadow:0 10px 26px rgba(0,0,0,.45);transition:transform .12s,background .2s;}
  .tool:active{transform:scale(.9);background:rgba(231,192,106,.2);}
  .tool .ic{font-size:21px;line-height:1;} .tool .n{font-size:9px;font-weight:800;color:var(--gold);}
  .tool.off{opacity:.4;}
  #muteBtn{position:fixed;top:max(10px,env(safe-area-inset-top));right:max(12px,env(safe-area-inset-right));z-index:11;
    width:40px;height:40px;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;
    background:var(--panel);border:1px solid var(--line);color:var(--ink);backdrop-filter:blur(12px);box-shadow:0 10px 26px rgba(0,0,0,.45);}

  #combo{position:fixed;left:50%;top:26%;transform:translateX(-50%) scale(.5);z-index:12;pointer-events:none;
    font-size:34px;font-weight:900;letter-spacing:1px;opacity:0;
    background:linear-gradient(100deg,var(--mint),var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 2px 18px rgba(231,192,106,.6));}
  #flash{position:fixed;inset:0;background:radial-gradient(circle,rgba(231,192,106,.35),transparent 70%);opacity:0;pointer-events:none;z-index:8;}

  .overlay{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;gap:22px;background:radial-gradient(120% 90% at 50% 38%,rgba(18,26,38,.55),rgba(5,8,14,.95));
    backdrop-filter:blur(8px);transition:opacity .4s;}
  .overlay.hidden{opacity:0;pointer-events:none;}
  .title{font-size:clamp(38px,11vw,76px);font-weight:800;letter-spacing:3px;line-height:.95;
    background:linear-gradient(105deg,var(--mint),var(--cream) 50%,var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 4px 26px rgba(0,0,0,.55));}
  .sub{font-size:12px;letter-spacing:4px;color:var(--muted);text-transform:uppercase;margin-top:-8px;}
  .panel{position:relative;overflow:hidden;background:var(--panel);border:1px solid var(--line);border-radius:22px;
    padding:24px 30px;max-width:90vw;box-shadow:0 28px 80px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.07);}
  .panel::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;
    background:linear-gradient(90deg,transparent,var(--mint) 30%,var(--gold) 70%,transparent);opacity:.9;}
  .help{font-size:13px;line-height:1.95;color:var(--muted);} .help b{color:var(--mint);}
  .gostats{display:flex;gap:34px;justify-content:center;margin:4px 0 14px;}
  .gostats .l{font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
  .gostats .v{font-size:32px;font-weight:800;}
  .newbest{color:var(--gold);font-weight:800;letter-spacing:3px;font-size:13px;animation:pulse 1.3s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}

  /* full-bleed banner home */
  #menu{align-items:stretch;justify-content:flex-end;padding:0;gap:0;backdrop-filter:none;
    background:
      linear-gradient(to top,rgba(5,8,14,.94) 0%,rgba(5,8,14,.5) 22%,transparent 48%),
      linear-gradient(to bottom,rgba(5,8,14,.5) 0%,transparent 26%),
      url('banner-desktop.png') center center / cover no-repeat, var(--bg);
    animation:fadeIn .6s ease both;}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  @media (max-width:600px){
    #menu{background:
      linear-gradient(to top,rgba(5,8,14,.96) 0%,rgba(5,8,14,.55) 26%,transparent 54%),
      url('banner-mobile.png') center top / 100% auto no-repeat, var(--bg);}
  }
  .menu-dock{position:relative;z-index:2;width:100%;display:flex;flex-direction:column;align-items:center;
    gap:15px;padding:0 22px max(34px,calc(env(safe-area-inset-bottom) + 22px));animation:dockIn .6s .15s cubic-bezier(.2,.8,.2,1) both;}
  @keyframes dockIn{from{opacity:0;transform:translateY(28px);}to{opacity:1;transform:none;}}
  .menu-dock .help{max-width:440px;text-align:center;text-shadow:0 2px 14px rgba(0,0,0,.9);}
  .btn{pointer-events:auto;cursor:pointer;border:1px solid var(--line);background:rgba(255,255,255,.05);color:var(--ink);
    border-radius:14px;padding:15px 26px;font-family:var(--font);font-size:16px;font-weight:700;letter-spacing:2px;transition:all .15s;}
  .btn-primary{background:linear-gradient(100deg,rgba(84,214,178,.24),rgba(231,192,106,.24));border-color:rgba(84,214,178,.5);color:var(--cream);}
  .btn-primary:hover{background:linear-gradient(100deg,rgba(84,214,178,.36),rgba(231,192,106,.36));border-color:var(--gold);transform:translateY(-2px);}
  .btn-play{width:min(440px,86vw);padding:18px 26px;font-size:18px;letter-spacing:3px;border-radius:18px;
    background:linear-gradient(100deg,rgba(84,214,178,.95),rgba(231,192,106,.95));border:0;color:#08110d;font-weight:800;
    box-shadow:0 16px 44px -10px rgba(84,214,178,.7),0 6px 22px rgba(0,0,0,.5);animation:playPulse 2.4s ease-in-out infinite;}
  .btn-play:hover{filter:brightness(1.07);transform:translateY(-2px);}
  @keyframes playPulse{0%,100%{box-shadow:0 16px 44px -10px rgba(84,214,178,.6),0 6px 22px rgba(0,0,0,.5);}
    50%{box-shadow:0 20px 60px -8px rgba(84,214,178,.95),0 6px 22px rgba(0,0,0,.5);}}
  #loading{position:fixed;inset:0;z-index:30;display:flex;align-items:center;justify-content:center;background:var(--bg);
    color:var(--muted);font-size:13px;letter-spacing:3px;transition:opacity .5s;}
  #loading.hidden{opacity:0;pointer-events:none;display:none;}
  @media (prefers-reduced-motion:reduce){ .menu-dock,#menu,.btn-play{animation:none;} }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hud">
  <div class="chip level"><div class="l">Level</div><div class="v" id="ui-level">1</div></div>
  <div class="chip score"><div class="l">Score</div><div class="v" id="ui-score">0</div></div>
  <div class="chip best"><div class="l">Best</div><div class="v" id="ui-best">0</div></div>
</div>
<div id="muteBtn"></div>
<div id="tools">
  <div class="tool" id="undoBtn"><div class="ic">↩️</div><div class="n" id="undoN">3</div></div>
  <div class="tool" id="shuffleBtn"><div class="ic">🔀</div><div class="n" id="shuffleN">3</div></div>
</div>
<div id="combo"></div>
<div id="flash"></div>

<div class="overlay" id="menu">
  <div class="menu-dock">
    <div class="help">Tap the glowing 3D tiles into the tray · line up <b>3 of a kind</b> to clear them.</div>
    <div class="btn btn-play" id="startBtn">PLAY ▶</div>
  </div>
</div>

<div class="overlay hidden" id="result">
  <div class="title" id="resTitle" style="font-size:clamp(34px,9vw,64px)">LEVEL CLEAR</div>
  <div id="newbestLine" class="newbest" style="display:none">★ NEW BEST ★</div>
  <div class="panel">
    <div class="gostats">
      <div><div class="l">Score</div><div class="v" id="res-score" style="color:var(--mint)">0</div></div>
      <div><div class="l">Best</div><div class="v" id="res-best" style="color:var(--gold)">0</div></div>
    </div>
    <div class="btn btn-primary" id="resBtn">CONTINUE ▶</div>
  </div>
</div>

<div id="loading">LOADING…</div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.169.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.169.0/examples/jsm/"

<script type="module">
import * as THREE from 'three';
import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

// ---------------- palette + symbols ----------------
// vivid claymorphism palette (bright albedo; e = accent for glow/particles)
const FACES = [
  {b:0x4ECDC4,e:0x6ff0e6}, {b:0xFF6B9D,e:0xff8fb6}, {b:0xFFC75F,e:0xffd98a},
  {b:0x5BC8FF,e:0x8adcff}, {b:0xB48CFF,e:0xcdb0ff}, {b:0x6BE3B8,e:0x9af0d2},
  {b:0xFF8A5B,e:0xffae88}, {b:0x9BE36A,e:0xbdf094}, {b:0xFF7AA8,e:0xffa1c4},
  {b:0x57E0E0,e:0x8af0f0}, {b:0xFFD23F,e:0xffe27a}, {b:0xC9A8FF,e:0xdcc6ff},
];
const SYMBOLS = ['🍓','🍋','🍇','🫐','🍊','🥝','🍑','🌶️','🥥','🔔','⭐','💎','🍀','🌸','🎈','🍪'];

// ---------------- state ----------------
const S = {
  tiles:[], trayArr:[], score:0, best:0, level:1, undo:3, shuffle:3,
  history:[], started:false, over:false, won:false, muted:false, busy:false,
};
function loadBest(){ try{ S.best=+localStorage.getItem('tt3d_best')||0; }catch(e){} }
function saveBest(){ try{ localStorage.setItem('tt3d_best',S.best); }catch(e){} }

// ---------------- audio ----------------
let _ac=null;
function ac(){ if(!_ac){ try{ _ac=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return _ac; }
function beep(f,d,t,v,slide){ if(S.muted)return; const c=ac(); if(!c)return; const o=c.createOscillator(),g=c.createGain(),n=c.currentTime;
  o.type=t||'sine'; o.frequency.setValueAtTime(f,n); if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(40,slide),n+d);
  g.gain.setValueAtTime(0,n); g.gain.linearRampToValueAtTime(v||0.16,n+0.008); g.gain.exponentialRampToValueAtTime(0.0001,n+d);
  o.connect(g); g.connect(master||c.destination); o.start(n); o.stop(n+d+0.03); }
let master=null, musicNodes=[];
function initAudioGraph(){ const c=ac(); if(!c||master)return; master=c.createGain(); master.gain.value=0.9; master.connect(c.destination); }
function startMusic(){ const c=ac(); if(!c||musicNodes.length||S.muted)return; initAudioGraph();
  const root=110, mk=(f,ty,v)=>{ const o=c.createOscillator(),g=c.createGain(); o.type=ty; o.frequency.value=f; g.gain.value=v; o.connect(g); g.connect(master); o.start(); return [o,g]; };
  const filt=c.createBiquadFilter(); filt.type='lowpass'; filt.frequency.value=520;
  const a=mk(root,'sine',0.05), b=mk(root*1.5,'triangle',0.022), d=mk(root*2.01,'sine',0.016);
  a[1].disconnect(); b[1].disconnect(); d[1].disconnect(); a[1].connect(filt); b[1].connect(filt); d[1].connect(filt); filt.connect(master);
  const lfo=c.createOscillator(), lg=c.createGain(); lfo.frequency.value=0.08; lg.gain.value=140; lfo.connect(lg); lg.connect(filt.frequency); lfo.start();
  musicNodes=[a[0],b[0],d[0],lfo]; }
function unlock(){ const c=ac(); if(!c)return; if(c.state==='suspended')c.resume(); initAudioGraph(); if(!S.muted)startMusic(); }
const sndPick =()=>beep(540,0.08,'triangle',0.16,760);
const sndMatch=()=>{ [523,659,784].forEach((f,i)=>setTimeout(()=>beep(f,0.2,'triangle',0.24),i*60)); };
const sndErr  =()=>beep(170,0.18,'sawtooth',0.18,90);
const sndWin  =()=>{ [523,659,784,1046,1318].forEach((f,i)=>setTimeout(()=>beep(f,0.22,'triangle',0.28),i*90)); };
const sndOver =()=>{ beep(400,0.5,'sawtooth',0.3,80); setTimeout(()=>beep(200,0.45,'sawtooth',0.24,60),180); };

// ---------------- three setup ----------------
const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:false,powerPreference:'high-performance'});
renderer.outputColorSpace=THREE.SRGBColorSpace;
renderer.toneMapping=THREE.NeutralToneMapping; renderer.toneMappingExposure=1.0;
const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x16213e, 0.010);
const camera=new THREE.PerspectiveCamera(48, 1, 0.1, 100);

// PBR environment for crisp clay reflections (no glare)
const pmrem=new THREE.PMREMGenerator(renderer);
scene.environment=pmrem.fromScene(new RoomEnvironment(),0.04).texture;

// gradient backdrop (dark navy per spec)
(function(){ const cv=document.createElement('canvas'); cv.width=2; cv.height=256; const g=cv.getContext('2d');
  const grd=g.createLinearGradient(0,0,0,256); grd.addColorStop(0,'#1a1a2e'); grd.addColorStop(1,'#16213e');
  g.fillStyle=grd; g.fillRect(0,0,2,256); const tex=new THREE.CanvasTexture(cv); tex.colorSpace=THREE.SRGBColorSpace; scene.background=tex; })();

// lights — crisp directional key + soft fill, gentle colored rims (no blowout)
const hemi=new THREE.HemisphereLight(0xcfe0ff,0x1a1a2e,0.35); scene.add(hemi);
const key=new THREE.DirectionalLight(0xffffff,1.35); key.position.set(5,10,6); scene.add(key);
const fill=new THREE.DirectionalLight(0xbcd2ff,0.35); fill.position.set(-6,4,-3); scene.add(fill);
const p1=new THREE.PointLight(0x4ECDC4,16,30); p1.position.set(-5,4,4); scene.add(p1);
const p2=new THREE.PointLight(0xFF6B9D,14,30); p2.position.set(6,3,2); scene.add(p2);
const p3=new THREE.PointLight(0xFFC75F,10,30); p3.position.set(0,6,-5); scene.add(p3);

// reflective floor + podium
const floorMat=new THREE.MeshStandardMaterial({color:0x0b0f1c,metalness:0.5,roughness:0.55,envMapIntensity:0.3});
const floor=new THREE.Mesh(new THREE.CircleGeometry(26,64),floorMat); floor.rotation.x=-Math.PI/2; floor.position.y=-0.6; scene.add(floor);
const podium=new THREE.Mesh(new THREE.CylinderGeometry(6.6,7.0,0.5,72),
  new THREE.MeshPhysicalMaterial({color:0x161d36,metalness:0.0,roughness:0.62,clearcoat:0.35,clearcoatRoughness:0.4,envMapIntensity:0.25}));
podium.position.y=-0.55; scene.add(podium);

// ambient floaty motes
const motes=(function(){ const n=90,g=new THREE.BufferGeometry(),pos=new Float32Array(n*3);
  for(let i=0;i<n;i++){ pos[i*3]=(Math.random()-0.5)*26; pos[i*3+1]=Math.random()*12-1; pos[i*3+2]=(Math.random()-0.5)*22; }
  g.setAttribute('position',new THREE.BufferAttribute(pos,3));
  const m=new THREE.PointsMaterial({color:0x8fe6d4,size:0.06,transparent:true,opacity:0.5,depthWrite:false,blending:THREE.AdditiveBlending});
  const pts=new THREE.Points(g,m); scene.add(pts); return pts; })();

// post-processing bloom
let composer,bloom;
function buildComposer(){ composer=new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene,camera));
  bloom=new UnrealBloomPass(new THREE.Vector2(1,1),0.32,0.45,0.72);
  composer.addPass(bloom); composer.addPass(new OutputPass()); }
buildComposer();

// ---------------- icon textures ----------------
const iconCache={};
function iconTexture(type){ if(iconCache[type])return iconCache[type];
  const s=160, cv=document.createElement('canvas'); cv.width=cv.height=s; const g=cv.getContext('2d');
  g.clearRect(0,0,s,s); g.font=Math.round(s*0.66)+'px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif';
  g.textAlign='center'; g.textBaseline='middle'; g.fillText(SYMBOLS[type%SYMBOLS.length], s/2, s/2+s*0.04);
  const tex=new THREE.CanvasTexture(cv); tex.colorSpace=THREE.SRGBColorSpace; tex.anisotropy=4; iconCache[type]=tex; return tex; }

// ---------------- tile factory ----------------
const TILE=1.0, GEO=new RoundedBoxGeometry(TILE,TILE*0.42,TILE,5,0.18);
const ICON_GEO=new THREE.PlaneGeometry(TILE*0.66,TILE*0.66);
const tileGroup=new THREE.Group(); scene.add(tileGroup);

function makeTileMesh(type){
  const f=FACES[type%FACES.length];
  const mat=new THREE.MeshPhysicalMaterial({color:f.b,roughness:0.5,metalness:0.0,
    clearcoat:0.9,clearcoatRoughness:0.22,emissive:f.b,emissiveIntensity:0.12,envMapIntensity:0.45});
  const box=new THREE.Mesh(GEO,mat);
  const icon=new THREE.Mesh(ICON_GEO,new THREE.MeshBasicMaterial({map:iconTexture(type),transparent:true,depthWrite:false}));
  icon.rotation.x=-Math.PI/2; icon.position.y=TILE*0.215;
  const grp=new THREE.Group(); grp.add(box); grp.add(icon);
  grp.userData={mat,box,icon,baseEmissive:0.08};
  return grp;
}

// ---------------- layout / generation ----------------
let layout={ originX:0, originZ:0, step:1.42, trayY:0.35, trayZ:0, traySpan:0 };

function rnd(n){ return Math.floor(Math.random()*n); }
function shuffleArr(a){ for(let i=a.length-1;i>0;i--){ const j=rnd(i+1); [a[i],a[j]]=[a[j],a[i]]; } return a; }

function clearTiles(){ for(const t of S.tiles){ tileGroup.remove(t.grp); } S.tiles=[]; S.trayArr=[]; }

function generate(level){
  clearTiles(); S.history=[]; S.over=false; S.won=false; S.busy=false;
  const layers=Math.min(5,2+Math.floor((level+1)/2));
  const typeCount=Math.min(SYMBOLS.length,5+level);
  const cols0=5, rows0=5;
  const step=layout.step;
  const positions=[];
  for(let L=0;L<layers;L++){
    const cols=Math.max(2,cols0-L), rows=Math.max(2,rows0-(L>0?L:0));
    const offX=-(cols-1)*step/2 + (L%2)*step*0.5;
    const offZ=-(rows-1)*step/2 + (L%2)*step*0.5;
    for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
      if(L>0 && Math.random()<0.14) continue;
      positions.push({ x:offX+c*step + (Math.random()-0.5)*0.04, z:offZ+r*step - 1.3 + (Math.random()-0.5)*0.04, layer:L });
    }
  }
  shuffleArr(positions);
  let count=positions.length-(positions.length%3);
  const slots=positions.slice(0,count);
  const bag=[]; for(let i=0;i<count/3;i++){ const tp=rnd(typeCount); bag.push(tp,tp,tp); } shuffleArr(bag);
  let id=0;
  for(let i=0;i<slots.length;i++){
    const p=slots[i], type=bag[i];
    const grp=makeTileMesh(type);
    const home=new THREE.Vector3(p.x, 0.06 + p.layer*0.36, p.z);
    grp.position.copy(home); grp.position.y+=6; grp.scale.setScalar(0.01); // drop-in anim
    grp.rotation.y=(Math.random()-0.5)*0.25;
    tileGroup.add(grp);
    S.tiles.push({ id:id++, type, gx:p.x, gz:p.z, layer:p.layer, taken:false, gone:false,
      grp, home, state:'intro', vel:new THREE.Vector3(), introDelay:i*0.012, t:0, slot:-1, pop:0 });
  }
  fitCamera();
}

// a tile is free if no higher-layer live tile overlaps its footprint
function isFree(t){
  if(t.taken||t.gone) return false;
  for(const o of S.tiles){ if(o===t||o.taken||o.gone) continue; if(o.layer<=t.layer) continue;
    if(Math.abs(o.gx-t.gx)<layout.step*0.88 && Math.abs(o.gz-t.gz)<layout.step*0.88) return false; }
  return true;
}

// ---------------- camera framing ----------------
function fitCamera(){
  const aspect=camera.aspect;
  let dist, h, fov, lookY=0.4, lookZ=0.0;
  if(aspect<0.62){ fov=52; dist=12.2; h=9.2; }
  else if(aspect<0.9){ fov=48; dist=12.0; h=9.2; }
  else if(aspect<1.4){ fov=42; dist=13.0; h=9.0; }
  else { fov=36; dist=14.6; h=8.8; }
  camera.fov=fov; camera.position.set(0,h,dist); camera.lookAt(0,lookY,lookZ); camera.updateProjectionMatrix();
  layoutTray();
}
function layoutTray(){
  const n=7; const span=aspectSpan(); layout.traySpan=span; const gap=span/n;
  layout.trayGap=gap; layout.trayZ=4.4; layout.trayY=0.3;
  for(let i=0;i<S.trayArr.length;i++){ const t=S.trayArr[i]; const tp=trayPos(i); t.home.copy(tp); }
}
function aspectSpan(){ const a=camera.aspect; return a<0.7 ? 6.2 : (a<1 ? 6.6 : 7.0); }
function trayPos(i){ const n=7,gap=layout.trayGap||0.94; const x=(i-(n-1)/2)*gap; return new THREE.Vector3(x,layout.trayY,layout.trayZ); }

// tray slot frames
const trayFrames=new THREE.Group(); scene.add(trayFrames);
function buildTrayFrames(){
  while(trayFrames.children.length) trayFrames.remove(trayFrames.children[0]);
  const n=7, gap=layout.trayGap||0.94;
  const fgeo=new RoundedBoxGeometry(gap*0.92,0.12,gap*0.92,4,0.12);
  const fmat=new THREE.MeshStandardMaterial({color:0x0e1622,metalness:0.5,roughness:0.5,emissive:0x16303a,emissiveIntensity:0.25,transparent:true,opacity:0.85});
  for(let i=0;i<n;i++){ const m=new THREE.Mesh(fgeo,fmat); const x=(i-(n-1)/2)*gap; m.position.set(x,layout.trayY-0.22,layout.trayZ); trayFrames.add(m); }
}

// ---------------- gameplay ----------------
function startGame(){ S.score=0; S.level=1; S.undo=3; S.shuffle=3; S.started=true;
  generate(S.level); buildTrayFrames(); refreshHUD(); hide('menu'); hide('result'); unlock(); }
function nextLevel(){ S.level++; S.undo=Math.min(5,S.undo+1); S.shuffle=Math.min(5,S.shuffle+1);
  generate(S.level); buildTrayFrames(); refreshHUD(); hide('result'); }

function pickTile(t){
  if(S.busy||S.over||!S.started) return;
  if(!isFree(t)){ sndErr(); bump(t); return; }
  if(S.trayArr.length>=7) return;
  t.taken=true;
  let idx=S.trayArr.length;
  for(let i=S.trayArr.length-1;i>=0;i--){ if(S.trayArr[i].type===t.type){ idx=i+1; break; } }
  S.trayArr.splice(idx,0,t); t.state='fly'; t.t=0;
  S.history.push(t.id); sndPick(); relayoutTray();
  resolveTray();
}
function relayoutTray(){ for(let i=0;i<S.trayArr.length;i++){ const t=S.trayArr[i]; t.slot=i; t.home.copy(trayPos(i)); if(t.state!=='fly')t.state='fly'; t.t=Math.min(t.t,0.0001); } }

function resolveTray(){
  const cnt={}; for(const t of S.trayArr) cnt[t.type]=(cnt[t.type]||0)+1;
  let mt=-1; for(const k in cnt){ if(cnt[k]>=3){ mt=+k; break; } }
  if(mt<0){ afterResolve(); return; }
  S.busy=true; const removing=[]; let need=3;
  S.trayArr=S.trayArr.filter(t=>{ if(t.type===mt&&need>0){ need--; removing.push(t); return false; } return true; });
  for(const t of removing){ t.state='pop'; t.t=0; burst(t.grp.position, t.type); }
  S.score+=30; S.history=[]; sndMatch(); showCombo('MATCH!'); flash(0.5); shake(0.5);
  relayoutTray();
  setTimeout(()=>{ S.busy=false; afterResolve(); }, 360);
}
function afterResolve(){ refreshHUD();
  const remain=S.tiles.some(t=>!t.taken&&!t.gone);
  if(!remain && S.trayArr.length===0){ S.won=true; winLevel(); return; }
  if(S.trayArr.length>=7){ gameOver(); }
}
function winLevel(){ S.score+=100+S.level*20; if(S.score>S.best){ S.best=S.score; saveBest(); }
  refreshHUD(); sndWin(); confetti(); setTimeout(()=>showResult(true),650); }
function gameOver(){ S.over=true; if(S.score>S.best){ S.best=S.score; saveBest(); }
  refreshHUD(); sndOver(); shake(1.2); setTimeout(()=>showResult(false),450); }

function doUndo(){ if(S.busy||S.over||S.undo<=0||S.history.length===0) return;
  const id=S.history.pop(); const idx=S.trayArr.findIndex(t=>t.id===id); if(idx<0)return;
  const t=S.trayArr.splice(idx,1)[0]; t.taken=false; t.state='return'; t.t=0; S.undo--; sndPick(); relayoutTray(); refreshHUD(); }
function doShuffle(){ if(S.busy||S.over||S.shuffle<=0) return;
  const live=S.tiles.filter(t=>!t.taken&&!t.gone); const types=shuffleArr(live.map(t=>t.type));
  live.forEach((t,i)=>{ t.type=types[i]; const f=FACES[t.type%FACES.length]; t.grp.userData.mat.color.setHex(f.b); t.grp.userData.mat.emissive.setHex(f.e);
    t.grp.userData.icon.material.map=iconTexture(t.type); t.grp.userData.icon.material.needsUpdate=true; t.pop=0.7; });
  S.shuffle--; beep(320,0.12,'triangle',0.16,540); refreshHUD(); }

// ---------------- particles ----------------
const PGEO=new THREE.IcosahedronGeometry(0.09,0); const pPool=[]; const pLive=[];
function getP(){ let m=pPool.pop(); if(!m){ m=new THREE.Mesh(PGEO,new THREE.MeshBasicMaterial({color:0xffffff})); scene.add(m); } m.visible=true; return m; }
function burst(pos,type){ const e=FACES[type%FACES.length].e; for(let i=0;i<14;i++){ const m=getP();
  m.material.color.setHex(Math.random()<0.5?e:0xffffff); m.position.copy(pos);
  const a=Math.random()*6.28, sp=2+Math.random()*4; pLive.push({m,vx:Math.cos(a)*sp,vy:2+Math.random()*4,vz:Math.sin(a)*sp,life:1,sc:1}); } }
function confetti(){ for(let i=0;i<90;i++){ const m=getP(); const e=FACES[rnd(FACES.length)].e;
  m.material.color.setHex(e); m.position.set((Math.random()-0.5)*6,5+Math.random()*2,(Math.random()-0.5)*4);
  pLive.push({m,vx:(Math.random()-0.5)*6,vy:Math.random()*3,vz:(Math.random()-0.5)*6,life:1.6,sc:1.3}); } }
function updateParts(dt){ for(let i=pLive.length-1;i>=0;i--){ const p=pLive[i];
  p.vy-=9*dt; p.m.position.x+=p.vx*dt; p.m.position.y+=p.vy*dt; p.m.position.z+=p.vz*dt; p.life-=dt*1.4;
  const s=Math.max(0.001,p.life)*p.sc; p.m.scale.setScalar(s);
  if(p.life<=0){ p.m.visible=false; pPool.push(p.m); pLive.splice(i,1); } } }

// ---------------- input ----------------
const ray=new THREE.Raycaster(); const ndc=new THREE.Vector2();
function onPointer(e){ if(!S.started||S.over||S.busy) return; const r=canvas.getBoundingClientRect(); const px=e.clientX-r.left, py=e.clientY-r.top;
  ndc.x=(px/r.width)*2-1; ndc.y=-(py/r.height)*2+1; ray.setFromCamera(ndc,camera);
  const meshes=S.tiles.filter(t=>!t.taken&&!t.gone).map(t=>t.grp.userData.box);
  const hit=ray.intersectObjects(meshes,false);
  if(hit.length){ const box=hit[0].object; const t=S.tiles.find(x=>x.grp.userData.box===box); if(t){ pickTile(t); } } }
canvas.addEventListener('pointerdown',(e)=>{ e.preventDefault(); unlock(); onPointer(e); },{passive:false});

// ---------------- camera shake ----------------
let shakeAmt=0;
function shake(v){ shakeAmt=Math.min(1.4,shakeAmt+v); }
function bump(t){ t.pop=0.5; }

// ---------------- HUD / overlays ----------------
function refreshHUD(){ document.getElementById('ui-level').textContent=S.level;
  document.getElementById('ui-score').textContent=S.score; document.getElementById('ui-best').textContent=S.best;
  document.getElementById('undoN').textContent=S.undo; document.getElementById('shuffleN').textContent=S.shuffle;
  document.getElementById('undoBtn').classList.toggle('off',S.undo<=0||S.history.length===0);
  document.getElementById('shuffleBtn').classList.toggle('off',S.shuffle<=0); }
let comboT=null;
function showCombo(txt){ const el=document.getElementById('combo'); el.textContent=txt; el.style.opacity=1; el.style.transform='translateX(-50%) scale(1.15)';
  clearTimeout(comboT); comboT=setTimeout(()=>{el.style.opacity=0;el.style.transform='translateX(-50%) scale(.5)';},700); }
function flash(v){ const f=document.getElementById('flash'); f.style.transition='none'; f.style.opacity=v;
  requestAnimationFrame(()=>{ f.style.transition='opacity .5s'; f.style.opacity=0; }); }
function hide(id){ document.getElementById(id).classList.add('hidden'); }
function show(id){ document.getElementById(id).classList.remove('hidden'); }
function showResult(win){ document.getElementById('resTitle').textContent=win?'LEVEL CLEAR':'GAME OVER';
  document.getElementById('res-score').textContent=S.score; document.getElementById('res-best').textContent=S.best;
  document.getElementById('newbestLine').style.display=(S.score>=S.best&&S.score>0)?'':'none';
  document.getElementById('resBtn').textContent=win?'CONTINUE ▶':'PLAY AGAIN ↻'; show('result'); }

document.getElementById('startBtn').addEventListener('click',startGame);
document.getElementById('resBtn').addEventListener('click',()=>{ if(S.won)nextLevel(); else startGame(); });
document.getElementById('undoBtn').addEventListener('click',doUndo);
document.getElementById('shuffleBtn').addEventListener('click',doShuffle);
const muteBtn=document.getElementById('muteBtn');
function drawMute(){ muteBtn.textContent=S.muted?'🔇':'🔊'; }
muteBtn.addEventListener('click',()=>{ S.muted=!S.muted; drawMute(); if(S.muted){ musicNodes.forEach(o=>{try{o.stop();}catch(e){}}); musicNodes=[]; } else { startMusic(); } });

// ---------------- resize ----------------
let W=1,H=1;
function resize(){ W=window.innerWidth; H=window.innerHeight; const dpr=Math.min(2,window.devicePixelRatio||1);
  renderer.setPixelRatio(dpr); renderer.setSize(W,H,false); camera.aspect=W/H; camera.updateProjectionMatrix();
  composer.setPixelRatio(dpr); composer.setSize(W,H); bloom.setSize(W,H); fitCamera(); }
window.addEventListener('resize',resize);
window.addEventListener('orientationchange',()=>setTimeout(resize,200));

// ---------------- main loop ----------------
const clock=new THREE.Clock();
function ease(a,b,k){ return a+(b-a)*k; }
function animate(){
  const dt=Math.min(0.05,clock.getDelta()); const tnow=clock.elapsedTime;
  // tiles
  for(let i=S.tiles.length-1;i>=0;i--){ const t=S.tiles[i]; const g=t.grp;
    if(t.state==='intro'){ t.t+=dt; if(t.t>t.introDelay){ g.position.y=ease(g.position.y,t.home.y,0.18); g.position.x=ease(g.position.x,t.home.x,0.2); g.position.z=ease(g.position.z,t.home.z,0.2);
        const s=ease(g.scale.x,1,0.2); g.scale.setScalar(s); if(Math.abs(g.position.y-t.home.y)<0.01&&s>0.99){ t.state='board'; g.position.copy(t.home); g.scale.setScalar(1);} } }
    else if(t.state==='board'){ const free=isFree(t); const mat=g.userData.mat;
        mat.emissiveIntensity=ease(mat.emissiveIntensity, free?0.26:0.05, 0.12);
        const ty=t.home.y + (free?Math.sin(tnow*2+t.gx+t.gz)*0.05:0); g.position.y=ease(g.position.y,ty,0.2);
        if(t.pop>0){ const s=1+0.12*t.pop; g.scale.setScalar(s); t.pop*=0.86; if(t.pop<0.02){t.pop=0;g.scale.setScalar(1);} } }
    else if(t.state==='fly'||t.state==='return'){ t.t+=dt*2.6; const k=Math.min(1,t.t);
        g.position.lerp(t.home, 0.25); g.scale.setScalar(ease(g.scale.x, t.state==='return'?1:0.86, 0.2));
        g.rotation.y=ease(g.rotation.y,0,0.2); g.userData.mat.emissiveIntensity=ease(g.userData.mat.emissiveIntensity,0.18,0.15);
        if(g.position.distanceTo(t.home)<0.02){ g.position.copy(t.home); t.state=(t.state==='return')?'board':'tray'; } }
    else if(t.state==='tray'){ const i7=t.slot; const tp=trayPos(i7); t.home.copy(tp); g.position.lerp(tp,0.25);
        g.position.y=tp.y+Math.sin(tnow*3+i7)*0.02; }
    else if(t.state==='pop'){ t.t+=dt*3; const s=Math.max(0.001,1.3-t.t*1.6); g.scale.setScalar(s); g.position.y+=dt*1.5; g.rotation.y+=dt*6;
        g.userData.mat.emissiveIntensity=2.2; if(t.t>=1){ t.gone=true; tileGroup.remove(g); S.tiles.splice(i,1); } }
  }
  // motes drift
  motes.rotation.y += dt*0.02; motes.position.y = Math.sin(tnow*0.3)*0.3;
  // camera shake
  if(shakeAmt>0){ camera.position.x += (Math.random()-0.5)*shakeAmt*0.12; camera.position.y += (Math.random()-0.5)*shakeAmt*0.1; shakeAmt*=0.86; if(shakeAmt<0.02)shakeAmt=0; }
  // gentle light pulse
  p1.intensity=120+Math.sin(tnow*1.3)*30; p2.intensity=110+Math.cos(tnow*1.1)*30;
  updateParts(dt);
  composer.render();
  requestAnimationFrame(animate);
}

// ---------------- boot ----------------
loadBest(); drawMute(); resize(); refreshHUD(); animate();
document.getElementById('loading').classList.add('hidden');
['pointerdown','touchend','keydown'].forEach(ev=>window.addEventListener(ev,unlock,{once:true}));
</script>
</body>
